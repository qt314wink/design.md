# Publishes @google/design.md to npm via Wombat Dressing Room on version tags.
# Trigger: push of a tag matching v* (e.g. v0.3.1, v1.0.0)
# Required secret: NPM_TOKEN (Wombat Dressing Room auth token)

name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
          cache: true

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        working-directory: packages/cli

      - name: Verify package integrity
        run: bun run check-package
        working-directory: packages/cli

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://wombat-dressing-room.appspot.com

      - name: Publish to npm
        run: npm publish
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
