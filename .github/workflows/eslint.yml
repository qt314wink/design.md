# Runs tsc --noEmit (TypeScript type checking) on every push and PR.
# The repo uses TypeScript strict mode as its linter — there is no separate
# ESLint config file (.eslintrc / eslint.config.*). Running ESLint with no
# config produces zero findings and wastes runner time.
#
# TypeScript strict + exactOptionalPropertyTypes + noUncheckedIndexedAccess
# (see tsconfig.base.json) provides equivalent static analysis for this
# codebase. Results are surfaced via workflow pass/fail on the PR status check.
name: Type Check

on:
  push:
    branches: ['**']
  pull_request:
  schedule:
    - cron: '41 10 * * 1'  # Weekly Monday scan

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run lint
        # bun run lint → turbo lint → tsc --noEmit --skipLibCheck in packages/cli
